<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juray IA | Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell dashboard-shell" data-page="welcome">
    <div class="container wide">
      <header class="site-header">
        <a href="index.html" class="brand">
          <span class="brand-badge">J</span>
          <span class="brand-copy"><strong>Juray IA</strong><span>Workspace</span></span>
        </a>
        <nav class="nav-links">
          <a href="chat.html">Chat</a>
          <button id="logoutBtn" class="nav-primary" type="button">Logout</button>
        </nav>
      </header>

      <main class="dashboard-grid">
        <section class="dashboard-card hero-dashboard glass-card">
          <div>
            <span class="eyebrow">Workspace</span>
            <h1>Hello, <span data-user-name>User</span>.</h1>
            <div class="mini-actions">
              <a href="chat.html" class="btn-primary">Open Chat</a>
              <a href="index.html" class="btn-secondary">Home</a>
            </div>
          </div>
          <div class="stat-grid">
            <article class="stat-card"><span class="eyebrow">Account</span><div class="stat-value" data-user-name>User</div></article>
            <article class="stat-card"><span class="eyebrow">Messages</span><div class="stat-value" id="messageCount">0</div></article>
          </div>
        </section>

        <aside class="dashboard-card glass-card side-panel">
          <span class="eyebrow">Profile</span>
          <dl class="summary-list">
            <div><dt>Name</dt><dd data-user-name>User</dd></div>
            <div><dt>Email</dt><dd data-user-email>user@example.com</dd></div>
          </dl>
        </aside>
      </main>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
