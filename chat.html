<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juray IA | Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <div class="container">
      <header class="site-header">
        <a href="index.html" class="brand">
          <span class="brand-badge">J</span>
          <span class="brand-copy">
            <strong>Juray IA</strong>
            <span>Assistente conversazionale</span>
          </span>
        </a>
        <nav class="nav-links">
          <a href="welcome.html">Welcome</a>
          <button id="logoutBtn" class="nav-primary" type="button">Logout</button>
        </nav>
      </header>

      <main class="chat-page">
        <section class="chat-shell">
          <header class="chat-header">
            <div>
              <span class="eyebrow">Chat demo</span>
              <h1>Parla con Juray IA</h1>
              <div class="chat-user" id="chatUser"></div>
            </div>
            <div class="row-gap">
              <a href="welcome.html" class="small-link">← Torna alla welcome</a>
            </div>
          </header>

          <div class="chat-body" id="messages"></div>

          <form class="chat-input-area" id="chatForm">
            <input class="input" type="text" id="userInput" placeholder="Scrivi un messaggio..." autocomplete="off" required>
            <button type="submit" class="btn-primary">Invia</button>
          </form>

          <p class="chat-tip">Suggerimento: prova a scrivere “ciao”, “login”, “registrazione” oppure “aiuto”.</p>
        </section>
      </main>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
