<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juray IA - Sign up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-center">
    <section class="form-card">
      <h1 class="form-title">Sign up</h1>
      <p class="form-subtitle">Se non sei registrato, crea qui il tuo account.</p>

      <form id="signupForm">
        <div class="form-group">
          <label for="name">Nome</label>
          <input class="input" type="text" id="name" placeholder="Il tuo nome" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input class="input" type="email" id="email" placeholder="esempio@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input class="input" type="password" id="password" placeholder="Minimo 4 caratteri" minlength="4" required>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Conferma password</label>
          <input class="input" type="password" id="confirmPassword" placeholder="Ripeti la password" minlength="4" required>
        </div>
        <button type="submit" class="btn">Crea account</button>
      </form>

      <div id="messageBox" class="alert"></div>

      <p class="helper-text">
        Hai già un account? <a href="login.html">Vai al login</a>
      </p>
      <p class="helper-text"><a href="index.html">← Torna alla home</a></p>
    </section>
  </main>

  <script src="auth.js"></script>
  <script>
    const form = document.getElementById('signupForm');
    const messageBox = document.getElementById('messageBox');

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        messageBox.className = 'alert error';
        messageBox.textContent = 'Le password non coincidono.';
        return;
      }

      const result = registerUser(name, email, password);
      if (result.ok) {
        messageBox.className = 'alert success';
        messageBox.textContent = result.message + ' Reindirizzamento al login...';
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1200);
      } else {
        messageBox.className = 'alert error';
        messageBox.textContent = result.message;
      }
    });
  </script>
</body>
</html>
