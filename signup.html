<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juray IA | Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell auth-shell">
    <div class="container auth-layout reverse">
      <main class="form-card glass-card">
        <span class="eyebrow">Registration</span>
        <h2 class="form-title">Create your account</h2>
        <form id="signupForm" class="form-grid">
          <div class="form-group">
            <label for="name">Full name</label>
            <input class="input" type="text" id="name" placeholder="Your full name" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input class="input" type="email" id="email" placeholder="name@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-field">
              <input class="input" type="password" id="password" placeholder="At least 4 characters" minlength="4" required>
              <button type="button" class="ghost-btn" id="togglePassword">Show</button>
            </div>
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm password</label>
            <div class="password-field">
              <input class="input" type="password" id="confirmPassword" placeholder="Repeat password" minlength="4" required>
              <button type="button" class="ghost-btn" id="toggleConfirmPassword">Show</button>
            </div>
          </div>
          <button type="submit" class="btn-primary">Create account</button>
        </form>
        <div id="signupStatus" class="status"></div>
        <p class="helper-text"><a href="login.html">Already have an account?</a></p>
      </main>

      <section class="auth-aside glass-card">
        <a href="index.html" class="brand compact-brand">
          <span class="brand-badge">J</span>
          <span class="brand-copy"><strong>Juray IA</strong><span>Create access</span></span>
        </a>
        <span class="eyebrow">Private Workspace</span>
        <h1>Start your session</h1>
        <ul class="feature-list">
          <li>Secure sign in</li>
          <li>Persistent sessions</li>
          <li>Saved conversation history</li>
        </ul>
      </section>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
