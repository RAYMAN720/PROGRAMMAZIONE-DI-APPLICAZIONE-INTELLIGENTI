<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juray IA - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-center">
    <section class="form-card">
      <h1 class="form-title">Login</h1>
      <p class="form-subtitle">Accedi con il tuo account per entrare nell'app.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input class="input" type="email" id="email" placeholder="esempio@email.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input class="input" type="password" id="password" placeholder="Inserisci la password" required>
        </div>
        <button type="submit" class="btn">Login</button>
      </form>

      <div id="messageBox" class="alert"></div>

      <p class="helper-text">
        Non sei registrato? <a href="signup.html">Crea un account</a>
      </p>
      <p class="helper-text">
        Utente demo: <strong>juray@gmail.com</strong> / <strong>1234</strong>
      </p>
      <p class="helper-text"><a href="index.html">← Torna alla home</a></p>
    </section>
  </main>

  <script src="auth.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const messageBox = document.getElementById('messageBox');

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const result = loginUser(email, password);

      if (result.ok) {
        window.location.href = 'welcome.html';
      } else {
        messageBox.className = 'alert error';
        messageBox.textContent = result.message;
      }
    });
  </script>
</body>
</html>
