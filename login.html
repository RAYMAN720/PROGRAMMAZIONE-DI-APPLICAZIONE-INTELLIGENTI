<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juray IA | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell auth-shell">
    <div class="container auth-layout">
      <section class="auth-aside glass-card">
        <a href="index.html" class="brand compact-brand">
          <span class="brand-badge">J</span>
          <span class="brand-copy"><strong>Juray IA</strong><span>Sign in</span></span>
        </a>
        <span class="eyebrow">Access</span>
        <h1>Welcome back</h1>
        <div class="demo-box">
          <span>Demo</span>
          <strong>juray@gmail.com</strong>
          <span>1234</span>
        </div>
      </section>

      <main class="form-card glass-card">
        <span class="eyebrow">Login</span>
        <h2 class="form-title">Access your account</h2>
        <form id="loginForm" class="form-grid">
          <div class="form-group">
            <label for="email">Email</label>
            <input class="input" type="email" id="email" placeholder="name@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <div class="password-field">
              <input class="input" type="password" id="password" placeholder="Enter password" required>
              <button type="button" class="ghost-btn" id="togglePassword">Show</button>
            </div>
          </div>
          <button type="submit" class="btn-primary">Login</button>
        </form>
        <div id="loginStatus" class="status"></div>
        <p class="helper-text"><a href="signup.html">Create account</a></p>
      </main>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
